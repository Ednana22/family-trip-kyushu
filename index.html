<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九州家族旅行 2025</title>
  <meta name="description" content="Edna & 小姑 的九州家族旅行紀錄 — 福岡・太宰府・湯布院・熊本">
  <meta property="og:title" content="九州家族旅行 2025">
  <meta property="og:description" content="7天行程完整紀錄，附地圖、照片與旅遊筆記">
  <meta property="og:type" content="website">
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    :root {
      --green: #748573;
      --white: #ffffff;
      --gray-bg: #f0f0f0;
      --gray-text: #888888;
      --gray-border: #dddddd;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      --card-radius: 12px;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--white);
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ─────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--white);
      border-bottom: 1px solid var(--gray-border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .nav-import-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--green);
      border: 0.5px solid var(--green);
      border-radius: 20px;
      padding: 4px 10px;
      cursor: pointer;
      background: none;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .nav-import-btn:hover {
      background: var(--green);
      color: var(--white);
    }
    .import-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      white-space: nowrap;
    }
    .import-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Layout ──────────────────────────── */
    .main-layout {
      display: flex;
      flex-direction: column;
    }

    /* ── Map ─────────────────────────────── */
    .map-container {
      height: 40vh;
      width: 100%;
      background: var(--gray-bg);
    }

    /* ── Timeline (mobile) ───────────────── */
    .timeline {
      padding: 0 16px 80px;
    }

    .card-highlight {
      outline: 2px solid var(--green);
      outline-offset: 2px;
      transition: outline 0.3s;
    }

    /* ── Day Header ──────────────────────── */
    .day-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 20px 0 10px;
      position: sticky;
      top: 49px;
      background: var(--white);
      z-index: 100;
      border-bottom: 1px solid var(--gray-border);
      margin-bottom: 12px;
    }
    .day-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .day-city {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    /* ── Card ────────────────────────────── */
    .card {
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      margin-bottom: 12px;
    }

    /* ── Card Photo ──────────────────────── */
    .card-photo {
      height: 180px;
      background: var(--gray-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }
    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-placeholder {
      font-size: 13px;
      color: var(--gray-text);
    }

    /* ── Card Body ───────────────────────── */
    .card-body {
      padding: 12px 14px 14px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }
    .card-hours {
      font-size: 12px;
      color: var(--gray-text);
      margin-bottom: 8px;
      white-space: pre-line;
    }

    /* ── Tags ────────────────────────────── */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .tag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      border: 0.5px solid var(--gray-border);
      color: var(--gray-text);
    }
    .tag-green {
      border-color: var(--green);
      color: var(--green);
    }

    /* ── Notes ───────────────────────────── */
    .card-notes {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-left: 1.5px solid var(--green);
      padding-left: 10px;
    }
    .note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .note-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gray-bg);
      color: var(--green);
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .note-bubble {
      font-size: 12px;
      line-height: 1.5;
      color: #444;
      background: var(--gray-bg);
      border-radius: 8px;
      padding: 5px 9px;
    }

    /* ── Connector between cards ─────────── */
    .card-connector {
      width: 1px;
      height: 12px;
      background: var(--gray-border);
      margin: 0 auto;
    }

    /* ── Map Pin ─────────────────────────── */
    .map-pin {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #748573;
      border: 2px solid #ffffff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .map-pin:hover { transform: scale(1.3); }

    /* ── Hover states ────────────────────── */
    .card-photo:hover .photo-placeholder {
      color: var(--green);
    }
    .card-photo:hover::after {
      content: '📷';
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 16px;
      opacity: 0.7;
    }
    .tag:hover {
      opacity: 0.75;
    }

    /* ── Desktop Layout (≥ 768px) ────────────── */
    @media (min-width: 768px) {
      body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .main-layout {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        overflow: hidden;
        min-height: 0;
      }

      .map-container {
        height: 100%;
      }

      .timeline {
        overflow-y: auto;
        height: 100%;
        padding: 0 24px 80px;
      }

      .day-header {
        top: 0;
      }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <span class="nav-title" id="nav-title">九州家族旅行 2025</span>
    <button class="nav-import-btn" onclick="document.getElementById('json-upload').click()">
      ＋ 匯入行程
    </button>
    <input type="file" id="json-upload" accept=".json,application/json"
           style="display:none" onchange="handleJsonUpload(this)">
  </nav>
  <div class="import-toast" id="import-toast"></div>

  <div class="main-layout">
    <div id="map" class="map-container"></div>
    <div id="timeline" class="timeline"></div>

      {
        id: 'day6-kamidori',

        lat: 32.8038, lng: 130.7108
      },

      // ── Day 7 · 熊本 ──────────────────────────────────────────
      {
        id: 'day7-suizenji',

    function initMap() {
      const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/bright',
        center: [130.9, 33.2],   // MapLibre uses [lng, lat]
        zoom: 7
      });
      window._map = map;
      map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
      map.on('load', () => renderPins(map));
    }

    function renderPins(map) {
      if (!window._markers) window._markers = [];
      LANDMARKS.forEach(lm => {
        const el = document.createElement('div');
        el.className = 'map-pin';
        el.title = lm.name;

        const popup = new maplibregl.Popup({
          offset: 18,
          closeButton: false,
          className: 'map-popup'
        }).setHTML(`<div style="font-family:-apple-system,sans-serif;font-size:13px;font-weight:500;padding:2px 4px">${lm.name}</div>`);

        const marker = new maplibregl.Marker({ element: el })
          .setLngLat([lm.lng, lm.lat])
          .setPopup(popup)
          .addTo(map);

        window._markers.push(marker);

        el.addEventListener('click', () => {
          const card = document.getElementById(`card-${lm.id}`);
          if (card) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.classList.add('card-highlight');
            setTimeout(() => card.classList.remove('card-highlight'), 1500);
          }
        });
      });
    }

    function renderTimeline() {
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';

      const byDay = {};
      LANDMARKS.forEach(lm => {
        if (!byDay[lm.day]) byDay[lm.day] = { city: lm.city, items: [] };
        byDay[lm.day].items.push(lm);
      });

      Object.keys(byDay)
        .map(Number)
        .sort((a, b) => a - b)
        .forEach(day => {
          const { city, items } = byDay[day];

          const header = document.createElement('div');
          header.className = 'day-header';
          header.id = `day-${day}`;
          header.innerHTML = `<span class="day-label">Day ${day}</span><span class="day-city">${city}</span>`;
          timeline.appendChild(header);

          items.forEach((lm, idx) => {
            timeline.appendChild(createCard(lm));
            if (idx < items.length - 1) {
              const connector = document.createElement('div');
              connector.className = 'card-connector';
              timeline.appendChild(connector);
            }
          });
        });
    }

    function createCard(lm) {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${lm.id}`;

      const savedPhoto = localStorage.getItem(`photo-${lm.id}`);
      const photoContent = savedPhoto
        ? `<img src="${savedPhoto}" alt="${lm.name}">`
        : `<span class="photo-placeholder">點擊上傳照片</span>`;

      const tagsHTML = lm.tags.map(t =>
        `<span class="tag ${t === '推薦' ? 'tag-green' : ''}">${t}</span>`
      ).join('');

      const notesHTML = lm.notes.map(n =>
        `<div class="note">
          <div class="note-avatar">${n.author}</div>
          <div class="note-bubble">${n.text}</div>
        </div>`
      ).join('');

      card.innerHTML = `
        <div class="card-photo" onclick="triggerUpload('${lm.id}')">
          ${photoContent}
          <input type="file" accept="image/*" id="file-${lm.id}"
                 style="display:none"
                 onchange="handlePhoto('${lm.id}', this)">
        </div>
        <div class="card-body">
          <h3 class="card-name">${lm.name}</h3>
          <p class="card-hours">${lm.hours}</p>
          <div class="card-tags">${tagsHTML}</div>
          <div class="card-notes">${notesHTML}</div>
        </div>`;
      return card;
    }

    function triggerUpload(id) {
      document.getElementById(`file-${id}`).click();
    }

    function handlePhoto(id, input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const dataUrl = e.target.result;
        try {
          localStorage.setItem(`photo-${id}`, dataUrl);
        } catch (e) {
          console.warn('localStorage quota exceeded — photo will not persist after reload.');
        }

        const photoDiv = document.querySelector(`#card-${id} .card-photo`);
        if (!photoDiv) return;
        photoDiv.innerHTML = `
          <img src="${dataUrl}" alt="">
          <input type="file" accept="image/*" id="file-${id}"
                 style="display:none"
                 onchange="handlePhoto('${id}', this)">`;
      };
      reader.readAsDataURL(file);
    }

    /* ──────────────────────────────────────
       JSON 匯入 / 解析 / 套用
    ────────────────────────────────────── */

    /**
     * 期望的 JSON 格式：
     * {
     *   "title": "九州家族旅行 2025",          // 選填：網頁標題
     *   "authors": [                           // 選填：筆記作者
     *     { "initial": "E", "name": "Edna" },
     *     { "initial": "S", "name": "小姑" }
     *   ],
     *   "days": [                              // 必填：天數陣列
     *     {
     *       "day": 1,                          // 必填：第幾天（數字）
     *       "city": "福岡",                    // 必填：城市名稱
     *       "landmarks": [                     // 必填：地標陣列
     *         {
     *           "name": "博多駅",              // 必填：地標名稱
     *           "hours": "全天開放",           // 選填：營業時間
     *           "tags": ["推薦", "必買"],       // 選填：標籤（推薦會顯示綠色）
     *           "lat": 33.5898,               // 必填：緯度
     *           "lng": 130.4205,              // 必填：經度
     *           "notes": [                    // 選填：旅遊筆記
     *             { "author": "E", "text": "筆記內容" },
     *             { "author": "S", "text": "筆記內容" }
     *           ]
     *         }
     *       ]
     *     }
     *   ]
     * }
     */

    function handleJsonUpload(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          applyTripData(data);
        } catch (err) {
          showToast('❌ JSON 格式錯誤，請確認檔案內容');
        }
      };
      reader.readAsText(file);
      input.value = '';   // 允許重複上傳同一檔案
    }

    // 將 days 陣列攤平為 LANDMARKS 格式（共用邏輯）
    function flattenDays(days) {
      const result = [];
      for (const d of days) {
        if (!d.day || !d.city || !Array.isArray(d.landmarks)) continue;
        d.landmarks.forEach((lm, idx) => {
          if (!lm.name || lm.lat == null || lm.lng == null) return;
          result.push({
            id:    `day${d.day}-${idx}`,
            day:   d.day,
            city:  d.city,
            name:  lm.name,
            hours: lm.hours || '',
            tags:  Array.isArray(lm.tags)  ? lm.tags  : [],
            notes: Array.isArray(lm.notes) ? lm.notes : [],
            lat:   lm.lat,
            lng:   lm.lng
          });
        });
      }
      return result;
    }

    // 手動匯入（有 toast 回饋、地圖重繪）
    function applyTripData(data) {
      if (!data.days || !Array.isArray(data.days)) {
        showToast('❌ 缺少 "days" 欄位');
        return;
      }

      if (data.title) {
        document.getElementById('nav-title').textContent = data.title;
        document.title = data.title;
      }

      const newLandmarks = flattenDays(data.days);
      if (newLandmarks.length === 0) {
        showToast('❌ 沒有找到有效地標（請確認 lat / lng / name）');
        return;
      }

      LANDMARKS.length = 0;
      newLandmarks.forEach(lm => LANDMARKS.push(lm));

      renderTimeline();

      if (window._map) {
        (window._markers || []).forEach(m => m.remove());
        window._markers = [];
        renderPins(window._map);
        const first = newLandmarks[0];
        window._map.flyTo({ center: [first.lng, first.lat], zoom: 8, duration: 1200 });
      }

      showToast(`✅ 已載入 ${newLandmarks.length} 個地標`);
    }

    function showToast(msg) {
      const el = document.getElementById('import-toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // 頁面載入時自動讀取 trip-template.json
    // fetch 成功 → 套用資料再初始化（map 和 timeline 直接用新資料）
    // fetch 失敗（file:// 或檔案不存在）→ 靜默 fallback，使用內建資料
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('trip-template.json');
        if (res.ok) {
          const data = await res.json();
          if (data.title) {
            document.getElementById('nav-title').textContent = data.title;
            document.title = data.title;
          }
          const flat = flattenDays(data.days || []);
          if (flat.length > 0) {
            LANDMARKS.length = 0;
            flat.forEach(lm => LANDMARKS.push(lm));
          }
        }
      } catch (_) {}   // file:// 或網路錯誤 → 繼續用內建資料

      renderTimeline();
      initMap();
    });
  </script>

  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

</body>
</html>
