<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九州家族旅行 2025</title>
  <style>
    :root {
      --green: #748573;
      --white: #ffffff;
      --gray-bg: #f0f0f0;
      --gray-text: #888888;
      --gray-border: #dddddd;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      --card-radius: 12px;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--white);
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ─────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--white);
      border-bottom: 1px solid var(--gray-border);
      padding: 14px 16px;
    }
    .nav-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    /* ── Layout ──────────────────────────── */
    .main-layout {
      display: flex;
      flex-direction: column;
    }

    /* ── Map ─────────────────────────────── */
    .map-container {
      height: 40vh;
      width: 100%;
      background: var(--gray-bg);
    }

    /* ── Timeline (mobile) ───────────────── */
    .timeline {
      padding: 0 16px 80px;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <span class="nav-title">九州家族旅行 2025</span>
  </nav>

  <div class="main-layout">
    <div id="map" class="map-container"></div>
    <div id="timeline" class="timeline"></div>
  </div>

      {

        lat: 32.7990, lng: 130.7325
      }
    ];

    function initMap() {
      const map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 33.2, lng: 130.9 },
        zoom: 8,
        disableDefaultUI: true,
        zoomControl: true,
        mapTypeControl: false,
        styles: [
          { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
          { featureType: 'transit', elementType: 'labels', stylers: [{ visibility: 'off' }] }
        ]
      });
      window._map = map;
      // Pins will be added in Task 4 after data is defined
    }
  </script>

  <!-- Replace YOUR_API_KEY with your Google Maps API key -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"
    async defer>
  </script>

</body>
</html>
